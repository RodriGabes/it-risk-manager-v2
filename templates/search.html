<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ITRM v2</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    margin:30px;
}

h2 {
    text-align: center;
    color: #4e4e4e;
    margin-bottom: 10px;
}

.container{
    display:flex;
    gap:25px;
}

.box{
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,.15);
}

#searchBox{
    width:340px;
}

#resultsBox{
    flex:1;
}

.mode-buttons{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
    margin-bottom:20px;
    text-decoration: none;
    color: white;
    border-radius: 6px;
    transition: 0.3s;
    font-weight: bold;
}

.mode-buttons button{
    padding:10px;
    cursor:pointer;
}

.mode-buttons button.active{
    background:#2979ff;
    color:white;
}

label{
    display:block;
    margin-top:12px;
}

select,input{
    width:100%;
    padding:8px;
    margin-top:4px;
}

#searchButton{
    margin-top:20px;
    width:100%;
    padding:10px;
}

.result{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:10px;
    border-bottom:1px solid #ddd;
}

.result-info{
    display:flex;
    gap:15px;
    align-items:center;
}

.result button{
    padding:6px 12px;
}

.pagination{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.pagination button{
    padding:8px 15px;
}
</style>

</head>
<body>
<div class="container">
<div class="box" id="searchBox">
<h2>Busca</h2>
<div class="mode-buttons">
<button class="mode active" data-mode="id">ID</button>
<button class="mode" data-mode="association">Associação</button>
<button class="mode" data-mode="name">Nome</button>
<button class="mode" data-mode="table">Tabela</button>
</div>
<div id="fields"></div>
<button id="searchButton">Buscar</button>
</div>
<div class="box" id="resultsBox">
<h2>Resultados</h2>
<div id="results"></div>
<div class="pagination">
<button id="prev">Anterior</button>
<span id="pageInfo"></span>
<button id="next">Próxima</button>
</div>
</div>
</div>
<script>

const tabelas=[
["Ativos","A"],
["Vulnerabilidades","V"],
["Setores","S"],
["Responsáveis","R"]
];

let modo="id";

const fields=document.getElementById("fields");

function criarDropdown(){
    let html="<label>Tabela</label>";
    html+="<select id='table'>";
    tabelas.forEach(t=>{
        html+=`<option value="${t[1]}">${t[0]}</option>`;
    });
    html+="</select>";
    return html;
}
function renderFields(){
    let html="";
    if(modo!="table")
        html+=criarDropdown();
    else{
        html="<label>Tabela</label>";
        html+="<select id='table'>";
        tabelas.forEach(t=>{
            html+=`<option value="${t[1]}">${t[0]}</option>`;
        });
        html+="</select>";
    }
    if(modo=="id" || modo=="association"){
        html+="<label>ID</label>";
        html+="<input id='value' type='number'>";
    }
    if(modo=="name"){
        html+="<label>Nome</label>";
        html+="<input id='value' type='text'>";
    }
    fields.innerHTML=html;
}

renderFields();

document.querySelectorAll(".mode").forEach(b=>{
    b.onclick=()=>{
        document.querySelector(".active").classList.remove("active");
        b.classList.add("active");
        modo=b.dataset.mode;
        renderFields();
    }
});

const resultsPerPage=10;

let results=[];
let page=1;

function renderResults(){
    const list=document.getElementById("results");
    list.innerHTML="";
    const start=(page-1)*resultsPerPage;
    const end=start+resultsPerPage;
    results.slice(start,end).forEach(r=>{
        const row=document.createElement("div");
        row.className="result";
        row.innerHTML=`
        <div class="result-info">
        <strong>${r.tipo}</strong>
        <span>${r.id}</span>
        <span>${r.nome}</span>
        </div>
        <button onclick="window.location='/view?t=${r.tipo}&id=${r.id}'">
        Visualizar
        </button>
        `;
        list.appendChild(row);
    });
    const totalPages=Math.max(1,Math.ceil(results.length/resultsPerPage));
    document.getElementById("pageInfo").innerHTML=page+" / "+totalPages;
    document.getElementById("prev").disabled=page==1;
    document.getElementById("next").disabled=page==totalPages;
}
document.getElementById("prev").onclick=()=>{
    if(page>1){
        page--;
        renderResults();
    }
}
document.getElementById("next").onclick=()=>{
    if(page<Math.ceil(results.length/resultsPerPage)){
        page++;
        renderResults();
    }
}
async function buscar(){
    const resposta = await fetch("/search",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            mode:modo,
            table:document.getElementById("table").value,
            value:document.getElementById("value")?.value
        })
    });
    results = await resposta.json();
    renderResults();
}
document.getElementById("searchButton").onclick=buscar;
renderResults();
</script>
</body>
</html>
